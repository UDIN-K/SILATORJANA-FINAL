name: silatorjana_flutter
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.0.10+1
  local_auth: any

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  lucide_icons_flutter: ^3.1.14+2
  flutter_animate: ^4.5.2
