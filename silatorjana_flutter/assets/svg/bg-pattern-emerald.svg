<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#022c22" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hexGrid" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
      <!-- Hexagon outlines -->
      <polygon points="60,2 110,28 110,76 60,102 10,76 10,28" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08"/>
      <!-- Inner hex detail -->
      <polygon points="60,18 95,36 95,68 60,86 25,68 25,36" fill="none" stroke="#34d399" stroke-width="0.3" stroke-opacity="0.05"/>
      <!-- Center dot -->
      <circle cx="60" cy="52" r="2" fill="#10b981" fill-opacity="0.1"/>
      <!-- Node connectors -->
      <line x1="60" y1="2" x2="60" y2="18" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
      <line x1="110" y1="28" x2="95" y2="36" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
      <line x1="110" y1="76" x2="95" y2="68" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
      <line x1="60" y1="102" x2="60" y2="86" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
      <line x1="10" y1="76" x2="25" y2="68" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
      <line x1="10" y1="28" x2="25" y2="36" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#34d399" fill-opacity="0.12"/>
    </pattern>
    <!-- Animated circuit paths -->
    <pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M0,100 h40 l10,-10 h30 l10,10 h30" fill="none" stroke="#10b981" stroke-width="0.4" stroke-opacity="0.06"/>
      <path d="M100,0 v40 l-10,10 v30 l10,10 v30" fill="none" stroke="#10b981" stroke-width="0.4" stroke-opacity="0.06"/>
      <path d="M140,200 v-40 l10,-10 v-30 l-10,-10 v-30" fill="none" stroke="#34d399" stroke-width="0.3" stroke-opacity="0.04"/>
      <circle cx="40" cy="100" r="3" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08"/>
      <circle cx="130" cy="100" r="3" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08"/>
      <circle cx="100" cy="40" r="3" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08"/>
      <circle cx="100" cy="130" r="3" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.08"/>
      <!-- Corner accents -->
      <rect x="38" y="98" width="4" height="4" rx="1" fill="#10b981" fill-opacity="0.06"/>
      <rect x="98" y="38" width="4" height="4" rx="1" fill="#10b981" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Base gradient -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Glow orbs -->
  <rect width="800" height="800" fill="url(#glowA)"/>
  <rect width="800" height="800" fill="url(#glowB)"/>

  <!-- Pattern layers -->
  <rect width="800" height="800" fill="url(#hexGrid)"/>
  <rect width="800" height="800" fill="url(#dots)"/>
  <rect width="800" height="800" fill="url(#circuit)"/>

  <!-- Decorative floating shapes -->
  <!-- Large subtle ring top-left -->
  <circle cx="120" cy="150" r="100" fill="none" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.06"/>
  <circle cx="120" cy="150" r="80" fill="none" stroke="#34d399" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Large ring bottom-right -->
  <circle cx="680" cy="650" r="130" fill="none" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.06"/>
  <circle cx="680" cy="650" r="110" fill="none" stroke="#34d399" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Abstract document shapes (evoking proposals/admin docs) -->
  <g transform="translate(580, 100)" opacity="0.04">
    <rect x="0" y="0" width="50" height="65" rx="4" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <line x1="10" y1="15" x2="40" y2="15" stroke="#34d399" stroke-width="1"/>
    <line x1="10" y1="25" x2="35" y2="25" stroke="#34d399" stroke-width="1"/>
    <line x1="10" y1="35" x2="38" y2="35" stroke="#34d399" stroke-width="1"/>
    <line x1="10" y1="45" x2="30" y2="45" stroke="#34d399" stroke-width="1"/>
    <!-- Folded corner -->
    <path d="M35,0 L50,0 L50,15 Z" fill="#34d399" fill-opacity="0.3"/>
  </g>

  <g transform="translate(100, 550)" opacity="0.04">
    <rect x="0" y="0" width="45" height="58" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="37" y2="12" stroke="#10b981" stroke-width="1"/>
    <line x1="8" y1="22" x2="32" y2="22" stroke="#10b981" stroke-width="1"/>
    <line x1="8" y1="32" x2="35" y2="32" stroke="#10b981" stroke-width="1"/>
    <!-- Checkmark -->
    <polyline points="12,42 18,48 32,36" fill="none" stroke="#10b981" stroke-width="1.5"/>
  </g>

  <!-- Diagonal accent lines -->
  <line x1="0" y1="300" x2="300" y2="0" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.04"/>
  <line x1="500" y1="800" x2="800" y2="500" stroke="#14b8a6" stroke-width="0.3" stroke-opacity="0.04"/>

  <!-- Corner accents (campus badge feel) -->
  <path d="M0,0 L80,0 L0,80 Z" fill="#10b981" fill-opacity="0.02"/>
  <path d="M800,800 L720,800 L800,720 Z" fill="#14b8a6" fill-opacity="0.02"/>
</svg>
