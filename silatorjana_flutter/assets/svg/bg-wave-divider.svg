  <!-- Wave Layer 1 (front - most visible) -->
  <path d="M0,360 C180,330 360,380 540,350 C720,320 900,370 1080,340 C1260,310 1360,360 1440,340 L1440,400 L0,400 Z" fill="url(#waveGrad1)"/>
  
