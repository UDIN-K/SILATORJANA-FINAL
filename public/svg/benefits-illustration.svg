<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="500" rx="32" fill="#F0FDF4"/>
  
  <!-- Background Pattern -->
  <g opacity="0.4">
    <circle cx="300" cy="250" r="200" stroke="#86EFAC" stroke-width="2" stroke-dasharray="8 8" />
    <circle cx="300" cy="250" r="140" stroke="#86EFAC" stroke-width="2" stroke-dasharray="8 8" />
  </g>

  <!-- Central Hub -->
  <circle cx="300" cy="250" r="60" fill="#FFFFFF" filter="url(#shadow-hub)" />
  <path d="M280 250 L295 265 L325 235" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Orbiting Nodes -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" filter="url(#shadow-hub)" />
    <rect x="-16" y="-12" width="32" height="24" rx="4" fill="#0EA5E9" opacity="0.2" />
    <path d="M-8 -6 L8 -6 M-8 0 L8 0 M-8 6 L4 6" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" />
  </g>

  <g transform="translate(500, 150)">
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" filter="url(#shadow-hub)" />
    <circle cx="0" cy="0" r="16" fill="#F59E0B" opacity="0.2" />
    <path d="M-8 0 L8 0 M0 -8 L0 8" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" />
  </g>

  <g transform="translate(150, 400)">
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" filter="url(#shadow-hub)" />
    <rect x="-16" y="-16" width="32" height="32" rx="8" fill="#F43F5E" opacity="0.2" />
    <path d="M-6 -6 L6 6 M-6 6 L6 -6" stroke="#F43F5E" stroke-width="4" stroke-linecap="round" />
  </g>

  <g transform="translate(450, 380)">
    <circle cx="0" cy="0" r="40" fill="#FFFFFF" filter="url(#shadow-hub)" />
    <rect x="-16" y="-12" width="32" height="24" rx="6" fill="#8B5CF6" opacity="0.2" />
    <path d="M-4 -4 L4 -4 M-4 4 L4 4" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Connection Lines -->
  <path d="M140 160 L240 220" stroke="#10B981" stroke-width="4" stroke-dasharray="10 10" />
  <path d="M460 160 L360 220" stroke="#10B981" stroke-width="4" stroke-dasharray="10 10" />
  <path d="M180 380 L260 290" stroke="#10B981" stroke-width="4" stroke-dasharray="10 10" />
  <path d="M410 370 L340 300" stroke="#10B981" stroke-width="4" stroke-dasharray="10 10" />

  <!-- Floating particles -->
  <circle cx="200" cy="100" r="6" fill="#10B981" opacity="0.5" />
  <circle cx="450" cy="250" r="8" fill="#0EA5E9" opacity="0.5" />
  <circle cx="250" cy="420" r="5" fill="#F59E0B" opacity="0.5" />

  <defs>
    <filter id="shadow-hub" x="-30" y="-30" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#047857" flood-opacity="0.1" />
    </filter>
  </defs>
</svg>
