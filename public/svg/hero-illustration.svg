<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="500" rx="32" fill="#F8FAFC"/>
  <!-- Abstract Dashboard Elements -->
  <rect x="40" y="40" width="120" height="40" rx="12" fill="#E2E8F0" />
  <rect x="180" y="40" width="380" height="40" rx="12" fill="#E2E8F0" />
  <!-- Main Card -->
  <rect x="180" y="100" width="380" height="240" rx="24" fill="#FFFFFF" filter="url(#drop-shadow)" />
  <rect x="220" y="140" width="140" height="24" rx="8" fill="#10B981" />
  <rect x="220" y="180" width="300" height="12" rx="6" fill="#F1F5F9" />
  <rect x="220" y="200" width="240" height="12" rx="6" fill="#F1F5F9" />
  <!-- Data Chart abstract -->
  <path d="M220 280 L260 240 L300 260 L360 200 L400 220 L480 160 L480 300 L220 300 Z" fill="url(#chart-gradient)" opacity="0.3" />
  <path d="M220 280 L260 240 L300 260 L360 200 L400 220 L480 160" stroke="#10B981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Side panel -->
  <rect x="40" y="100" width="120" height="240" rx="24" fill="#FFFFFF" filter="url(#drop-shadow)" />
  <rect x="60" y="130" width="80" height="16" rx="8" fill="#F1F5F9" />
  <rect x="60" y="170" width="60" height="12" rx="6" fill="#0EA5E9" />
  <rect x="60" y="200" width="40" height="12" rx="6" fill="#F1F5F9" />
  <rect x="60" y="230" width="70" height="12" rx="6" fill="#F1F5F9" />
  <circle cx="80" cy="290" r="20" fill="#E2E8F0" />
  
  <!-- Floating Elements -->
  <rect x="360" y="310" width="220" height="100" rx="24" fill="#FFFFFF" filter="url(#drop-shadow)" />
  <circle cx="410" cy="360" r="24" fill="#10B981" opacity="0.2" />
  <path d="M400 360 L408 368 L420 352" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="450" y="340" width="100" height="16" rx="8" fill="#1E293B" />
  <rect x="450" y="366" width="60" height="12" rx="6" fill="#94A3B8" />

  <defs>
    <filter id="drop-shadow" x="-20" y="-20" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.05" />
    </filter>
    <linearGradient id="chart-gradient" x1="220" y1="160" x2="220" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" />
      <stop offset="1" stop-color="#10B981" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
