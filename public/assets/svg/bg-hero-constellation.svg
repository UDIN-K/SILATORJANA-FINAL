<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="40%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <radialGradient id="heroGlowA" cx="25%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="heroGlowB" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="heroGlowC" cx="50%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1440" height="900" fill="url(#heroGrad)"/>
  
  <!-- Glow orbs -->
  <rect width="1440" height="900" fill="url(#heroGlowA)"/>
  <rect width="1440" height="900" fill="url(#heroGlowB)"/>
  <rect width="1440" height="900" fill="url(#heroGlowC)"/>

  <!-- Large decorative arcs (campus/institutional feel) -->
  <ellipse cx="720" cy="450" rx="600" ry="350" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.04"/>
  <ellipse cx="720" cy="450" rx="500" ry="280" fill="none" stroke="#34d399" stroke-width="0.4" stroke-opacity="0.03"/>
  <ellipse cx="720" cy="450" rx="400" ry="220" fill="none" stroke="#10b981" stroke-width="0.3" stroke-opacity="0.025"/>

  <!-- Network constellation (connected nodes) -->
  <g stroke="#10b981" stroke-opacity="0.06" stroke-width="0.5" fill="#10b981" fill-opacity="0.08">
    <!-- Nodes -->
    <circle cx="200" cy="200" r="4"/>
    <circle cx="350" cy="150" r="3"/>
    <circle cx="500" cy="250" r="5"/>
    <circle cx="650" cy="180" r="3.5"/>
    <circle cx="800" cy="300" r="4"/>
    <circle cx="950" cy="220" r="3"/>
    <circle cx="1100" cy="280" r="4.5"/>
    <circle cx="1250" cy="190" r="3"/>

    <circle cx="150" cy="500" r="3.5"/>
    <circle cx="300" cy="600" r="4"/>
    <circle cx="450" cy="520" r="3"/>
    <circle cx="600" cy="650" r="5"/>
    <circle cx="750" cy="580" r="3.5"/>
    <circle cx="900" cy="700" r="4"/>
    <circle cx="1050" cy="620" r="3"/>
    <circle cx="1200" cy="700" r="4.5"/>
    <circle cx="1350" cy="600" r="3"/>

    <!-- Connection lines -->
    <line x1="200" y1="200" x2="350" y2="150"/>
    <line x1="350" y1="150" x2="500" y2="250"/>
    <line x1="500" y1="250" x2="650" y2="180"/>
    <line x1="650" y1="180" x2="800" y2="300"/>
    <line x1="800" y1="300" x2="950" y2="220"/>
    <line x1="950" y1="220" x2="1100" y2="280"/>
    <line x1="1100" y1="280" x2="1250" y2="190"/>

    <line x1="150" y1="500" x2="300" y2="600"/>
    <line x1="300" y1="600" x2="450" y2="520"/>
    <line x1="450" y1="520" x2="600" y2="650"/>
    <line x1="600" y1="650" x2="750" y2="580"/>
    <line x1="750" y1="580" x2="900" y2="700"/>
    <line x1="900" y1="700" x2="1050" y2="620"/>
    <line x1="1050" y1="620" x2="1200" y2="700"/>
    <line x1="1200" y1="700" x2="1350" y2="600"/>

    <!-- Cross connections -->
    <line x1="200" y1="200" x2="150" y2="500" stroke-opacity="0.03"/>
    <line x1="500" y1="250" x2="450" y2="520" stroke-opacity="0.03"/>
    <line x1="800" y1="300" x2="750" y2="580" stroke-opacity="0.03"/>
    <line x1="1100" y1="280" x2="1050" y2="620" stroke-opacity="0.03"/>
  </g>

  <!-- Floating geometric accents -->
  <!-- Triangle -->
  <polygon points="1300,100 1340,170 1260,170" fill="none" stroke="#34d399" stroke-width="0.6" stroke-opacity="0.05"/>
  
  <!-- Diamond -->
  <polygon points="130,700 160,730 130,760 100,730" fill="none" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.05"/>
  
  <!-- Square with rotation -->
  <rect x="1180" y="450" width="30" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.04" transform="rotate(15 1195 465)"/>
  
  <!-- Pentagon -->
  <polygon points="250,350 275,335 300,350 293,378 257,378" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.04"/>

  <!-- Bottom wave -->
  <path d="M0,820 C200,780 400,860 600,830 C800,800 1000,850 1200,820 C1320,805 1400,830 1440,820 L1440,900 L0,900 Z" fill="#022c22" fill-opacity="0.4"/>
  <path d="M0,850 C180,830 360,870 540,850 C720,830 900,860 1080,845 C1260,830 1380,860 1440,850 L1440,900 L0,900 Z" fill="#064e3b" fill-opacity="0.2"/>

  <!-- Top vignette -->
  <rect width="1440" height="120" fill="url(#heroGlowC)" opacity="0.3"/>
</svg>
